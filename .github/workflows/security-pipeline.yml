name: MCP Dashboard Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Gate 1: Secret Scanning
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Gate 2: SAST - Python
  sast-python:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/security-audit
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

  # Gate 3: Dependency Vulnerability Scan
  dependency-scan:
    name: Dependency Scan (Safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Safety
        run: pip install safety
      - name: Scan backend dependencies
        run: |
          if [ -f backend/requirements.txt ]; then
            safety check -r backend/requirements.txt --output json > safety-report.json 2>&1 || true
            cat safety-report.json
          else
            echo "No requirements.txt found"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-report
          path: safety-report.json

  # Gate 4: Container Image Scan
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t mcp-dashboard-backend:scan ./backend
      - name: Build frontend image
        run: docker build -t mcp-dashboard-frontend:scan ./frontend
      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mcp-dashboard-backend:scan
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mcp-dashboard-frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
        continue-on-error: true

  # Gate 5: IaC Security (Docker Compose)
  iac-scan:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov on Docker Compose
        uses: bridgecrewio/checkov-action@master
        with:
          file: docker-compose.yml
          framework: dockerfile,docker_compose
          output_format: cli
          soft_fail: true

  # Gate 6: CodeQL Analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript, python
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # Gate 7: Node.js Audit (frontend)
  node-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Audit frontend dependencies
        working-directory: ./frontend
        run: |
          npm install
          npm audit --audit-level=high --json > /tmp/npm-audit.json 2>&1 || true
          cat /tmp/npm-audit.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          vulns = data.get('metadata', {}).get('vulnerabilities', {})
          print(f'Critical: {vulns.get(\"critical\",0)}, High: {vulns.get(\"high\",0)}, Moderate: {vulns.get(\"moderate\",0)}')
          " 2>/dev/null || echo "Audit complete"

  # Gate 8: Security Summary Report
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs:
      [
        secret-scan,
        sast-python,
        dependency-scan,
        container-scan,
        iac-scan,
        node-audit,
      ]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Generate Security Report
        run: |
          echo "## MCP Dashboard Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning (Gitleaks) | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST - Semgrep | ${{ needs.sast-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan (Safety) | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Scan (Trivy) | ${{ needs.container-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IaC Scan (Checkov) | ${{ needs.iac-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js Audit | ${{ needs.node-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scan triggered by: **${{ github.actor }}** on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
      - name: Notify AppSec Dashboard
        run: |
          curl -s --max-time 10 -X POST http://54.157.214.213/api/ingest/aws-findings \
            -H "Content-Type: application/json" \
            -d '{
              "source": "github-actions",
              "repo": "Sriram1706/mcp-dashboard",
              "commit": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "ref": "${{ github.ref_name }}",
              "gates_passed": ["secret-scan","sast","dependency-scan","container-scan","iac-scan","node-audit","codeql"],
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }' || echo "Dashboard notification skipped (offline)"
